services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: 12306-backend
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
    volumes:
      - ./backend/data:/app/backend/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: 12306-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
